  - id: "TF-08"
    title: "评分边界核查：主需正确但次需错误应判 1"
    priority: "P0"
    tags:
      - "scoring_boundary"
      - "primary_secondary_need"
      - "candidate_answer"
      - "partial_error"
    objective: "验证 Skill 在主需核心事实被证据支持、但次要原因解释或延伸判断缺少证据时，能够判定为 1 分，而不是误判为 0 分或 2 分。"
    input:
      user_request: "请核查下面这个回答是否真实。问题：示例科技公司 2024 年全年营收是否达到 100 亿元？候选回答：示例科技公司 2024 年全年营收达到 100 亿元，同比增长 8%，主要因为海外 AI 业务爆发式增长。"
      files: []
      pasted_data: "评测夹具：结构化财报数据支持“2024 年全年营收达到 100 亿元”和“同比增长 8%”；当前可用证据未提供海外 AI 业务收入分部、公告说明或管理层讨论来支持“主要因为海外 AI 业务爆发式增长”。"
      skill_specific_input:
        execution_preconditions:
          - "本用例允许使用评测夹具作为可观察证据，用于测试评分边界。"
          - "`westock-data` 可调用或评测夹具提供等价结构化财报证据。"
        expected_task_type: "scoring_boundary_check"
        expected_primary_score: 1
        expected_primary_need_status: "supported"
        expected_secondary_need_status: "insufficient_evidence"
    expected_output:
      required_actions:
        - "识别营收达到 100 亿元和同比增长 8% 属于主需核心事实。"
        - "识别海外 AI 业务爆发式增长属于次要原因解释或延伸判断。"
        - "将主需标记为 `supported` 或等价支持。"
        - "将次要原因解释标记为 `insufficient_evidence` 或等价证据不足。"
        - "给出 `1 分` 真实性评分，或明确表达主需正确但次需存在证据不足。"
        - "修正答案应保留被证据支持的主需，删除或弱化未证实原因解释。"
      required_content:
        - "必须区分主需和次需。"
        - "必须说明为什么不能给 `2 分`。"
        - "必须说明为什么不应因次需错误直接判 `0 分`。"
      prohibited_content:
        - "主需正确但次需证据不足时给 `2 分`。"
        - "仅因次要原因解释缺少证据就给 `0 分`。"
        - "修正答案继续保留未被证实的海外 AI 业务爆发原因。"
    judge:
      pass_if_all:
        - "回答明确区分主需和次需。"
        - "回答将营收与同比增长判断为被证据支持或等价表述。"
        - "回答将海外 AI 业务爆发原因判断为证据不足或等价表述。"
        - "回答给出 `1 分`，或明确表达主需正确但次需错误/证据不足对应部分通过。"
        - "修正答案没有继续保留未被证实的核心原因。"
      fail_if_any:
        - "主需正确但次需证据不足时给 `2 分`。"
        - "仅因次需证据不足就给 `0 分`。"
        - "未区分主需和次需。"
        - "修正答案继续声称海外 AI 业务爆发式增长是主要原因。"
    coverage:
