        - "tracingclaw_finance_rubrics.yaml#R2"
        - "tracingclaw_finance_rubrics.yaml#R6"
    fatal_errors:
        - "westock_data_unavailable_but_claimed_query_completed"
        - "formal_scoring_under_westock_data_failure"
        - "memory_or_web_substituted_for_westock_data"
