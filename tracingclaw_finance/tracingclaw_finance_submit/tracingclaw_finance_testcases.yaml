      pasted_data: ""
      skill_specific_input:
        execution_preconditions:
          - "`westock-data` 可调用。"
          - "若需要背景资讯补充，则 `mx-finance-search` 可调用。"
        expected_task_type: "mixed_claim_check"
        expected_conflict_types:
          - "time_scope"
          - "market_scope"
          - "currency_or_unit_scope"
          - "fact_vs_inference_scope"
    expected_output:
      required_actions:
        - "识别该问题混合了财报、行情、市值和结论推断。"
        - "拆分收入增长、ADR 股价创新高、港股基本面反转、人民币市值超过历史高点四个判断项。"
        - "分别说明每一项需要的时间、市场、币种和单位口径。"
        - "说明港股、ADR、美股、人民币市值之间不能直接混用。"
        - "为核心判断项给出 `supported / contradicted / insufficient_evidence` 或等价判断。"
        - "指出哪些地方需要进一步澄清或查询。"
      required_content:
        - "必须体现口径冲突或口径不足。"
        - "不能把“股价创新高”自动等同于“基本面全面反转”。"
        - "不能把 ADR 价格、港股价格和人民币市值直接混成同一口径。"
      prohibited_content:
        - "未拆解的整体性强结论。"
        - "把推测直接写成事实。"
        - "在口径冲突未消解时仍给 `2 分`。"
      advanced_expected_outputs:
        - "能够说明公司主体、交易市场、币种、交易日、财报期、市值统计口径需要分别核查。"
        - "能够说明如果只支持部分事实，应避免推出“全面反转”这类强结论。"
    judge:
      pass_if_all:
