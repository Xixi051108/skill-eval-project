        expected_behavior: "boundary_preservation"
    expected_output:
      required_actions:
        - "识别当前输入缺少关键上下文。"
        - "明确指出缺少标的、市场、时间、报告期或候选回答中的具体断言。"
        - "说明当前无法确认的范围。"
        - "对无法验证的核心断言标记为 `insufficient_evidence` 或等价判断。"
        - "给出需要补充的信息清单。"
      required_content:
        - "必须明确写出“无法确认”或等价边界表达。"
        - "必须说明缺少哪些信息。"
        - "不得给出无来源具体数字。"
        - "不得在证据不足时给 `2 分` 或伪装成已核实完成。"
      prohibited_content:
