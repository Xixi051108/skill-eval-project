        - "回答把无法验证的核心断言标记为 `insufficient_evidence` 或等价判断。"
        - "回答没有编造具体数字。"
        - "回答没有给出确定性投资建议。"
        - "回答给出了下一步需要补充的信息。"
      fail_if_any:
        - "在无足够上下文时直接给出精确数字。"
        - "用模糊措辞掩盖无法确认这一事实。"
