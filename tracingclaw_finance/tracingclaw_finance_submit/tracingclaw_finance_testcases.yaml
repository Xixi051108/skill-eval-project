      - "market_scope"
      - "currency_scope"
      - "time_scope"
    objective: "验证 Skill 在用户问题或候选回答存在市场、时间、币种或财年口径混用时，能够识别冲突并给出澄清或边界说明，而不是直接下确定结论。"
    input:
      user_request: "请核查这段回答是否可靠：腾讯控股 2024 年收入增长明显，最新美股 ADR 股价也创新高，所以腾讯港股基本面已经全面反转，当前市值按人民币口径已经超过历史高点。"
