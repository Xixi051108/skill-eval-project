        - "回答指出至少一种市场、时间、币种或事实推断口径冲突。"
        - "回答对至少两个核心判断项给出独立判断，而不是只给总判断。"
        - "回答没有把推测性结论直接判真。"
        - "回答没有在口径冲突显著时给 `2 分` 或等价满分评价。"
      fail_if_any:
        - "把多个判断项混成一个总判断。"
        - "没有任何市场、时间、币种或单位口径说明。"
        - "在口径冲突显著时仍直接给 `2 分` 或等价满分评价。"
        - "把 ADR 股价、港股价格和人民币市值直接混用且不说明风险。"
        - "把股价表现直接等同于基本面事实。"
