meta:
  skill_name: "db_report"
  task_type: "skill_evaluation"
  objective: >
    构建一套面向 db_report Skill 的自动化评估方案，用于系统检验该 Skill
    在数据库性能报告生成场景下的交付质量、数据可信度、场景覆盖度、
    鲁棒性与跨模型泛化能力。评估重点包括：本地数据源约束、报告类型识别、
    数据解析与质量门控、性能分析可信度、三格式交付质量，以及缺数据、
    字段异常、越权查询和指标编造等失败路径与红线场景。
  path_reference_basis: "relative_to_project_root"
  source_materials:
    required:
      - "readme.md"
      - "skill_eval_week_plan.md"
      - "db_report/readme.md"
      - "db_report/db_report_skill/db_report_skill/SKILL.md"
    optional_or_reference:
      - "db_report/db_report_skill/db_report_skill/changelog.md"
      - "db_report/db_report_skill/db_report_skill/references/*"
      - "db_report/db_report_skill/db_report_skill/scripts/*"
      - "db_report/db_report_skill/db_report_skill/templates/*"
      - "db_report/test-resource/test-resource/*"
      - "db_report/参考示例-仅供模板参考/ideal_state.md"
      - "db_report/参考示例-仅供模板参考/testcases.yaml"
  submit_scope:
    final_artifact: "submission.zip"
    expected_files:
      - "db_report_eval.yaml"
      - "tracingclaw_finance_eval.yaml"
      - "README.md"
    current_focus: "db_report_eval.yaml"
  naming_conventions:
    testcase_id_pattern: "DB-XX"
    meta_testcase_id_pattern: "META-DB-XX"
    rubric_id_pattern: "R1/R2/R3..."
    tag_style: "lower_snake_case"
    judge_style: "pass_if_all + fail_if_any"
    path_style: "relative_path"
  evaluation_principles:
    - "评估对象是 Skill 的行为质量。"
    - "所有测试用例必须具备明确输入、预期输出和可判定 judge。"
    - "优先覆盖高风险场景，包括缺数据、字段缺失、报告类型误判、指标编造和越权查询。"
    - "报告中的 TPS/QPS/P95/P99/duration 等性能指标必须能追溯到用户提供的本地数据。"
    - "缺少数据或数据质量不达标时，正确行为是停止、说明原因并要求补充数据，而不是生成正式报告。"
    - "评估方案应尽量支持跨模型复用，避免依赖某个特定大模型的表达习惯。"

logic_chain:
  skill_goal: >
    基于用户提供的本地数据库性能测试数据或粘贴 JSON，
    完成输入解析、数据接入、性能分析、图表生成和三格式报告交付，
    生成可信、可追溯、可复核的数据库性能测试报告。
  input_modes:
    - "本地 .log 文件"
    - "本地 .json 文件"
    - "本地 .csv 文件"
    - "本地 .xlsx 文件"
    - "用户粘贴的标准 records JSON"
    - "用户粘贴的原始测试行 JSON"
  output_contract:
    - "阶段 1 输出 intent.json"
    - "阶段 2 输出标准化 records.json 和 data_quality_summary.json"
    - "阶段 3 输出 analysis_results.json 和 insights.json"
    - "阶段 4 输出 charts/* 图表文件"
    - "阶段 5 输出 report.md、report.docx、report.html"
  tool_or_data_routing:
    - "先识别输入属于 local_file、local_data 或 missing_data。"
    - "local_file 按文件类型分流到 log/json/csv/xlsx 解析流程。"
    - "local_data 进入粘贴 JSON 解析流程。"
    - "缺少可用数据源时识别为 missing_data 并停止。"
    - "根据关键词或用户需求识别 report_type 为 single、comparison、iteration 或 custom。"
  execution_stages:
    - stage: "阶段1：输入解析"
      purpose: "识别用户提供的数据源、报告类型、筛选条件和输出格式。"
      key_outputs:
        - "intent.json"
        - "data_source_type"
        - "report_type"
        - "test_name_keywords 或 test_name_keywords_or"
      gate:
        name: "门控①：意图确认"
        purpose: "在进入数据接入前，让用户确认 Skill 对数据源、报告类型、筛选条件和输出格式的理解是否正确。"
    - stage: "阶段2：数据接入"
      purpose: "读取本地 log/json/csv/xlsx 或用户粘贴 JSON，并转换为标准 records.json。"
      key_outputs:
        - "records.json"
        - "meta"
        - "records"
        - "data_quality_summary"
      gate:
        name: "门控②：数据确认"
        purpose: "确认数据记录数、字段完整性、空值率、抽检结果和覆盖范围是否满足分析要求。"
    - stage: "阶段3：性能分析"
      purpose: "根据 report_type 分流执行 single、comparison、iteration 或 custom 分析。"
      key_outputs:
        - "analysis_results.json"
        - "insights.json"
      required_logic:
        - "single：分析单次测试的峰值 QPS、扩展性和 P95/P99 延迟。"
        - "comparison：进行多产品、多版本或多配置的公平对比。"
        - "iteration：分析版本趋势、累计变化和性能回归点。"
        - "custom：围绕用户指定问题进行专项分析。"
    - stage: "阶段4：图表生成"
      purpose: "根据 report_type 生成匹配报告类型的图表组合。"
      key_outputs:
        - "charts/*"
      required_logic:
        - "single：生成单产品性能画像图。"
        - "comparison：生成横向对比图、峰值对比图和综合对比图。"
        - "iteration：生成趋势图和回归点图。"
        - "custom：生成服务于专项问题的图表。"
    - stage: "阶段5：报告组装与交付"
      purpose: "将文字、表格、图表和洞察组装为 md/docx/html 三格式报告。"
      key_outputs:
        - "report.md"
        - "report.docx"
        - "report.html"
      gate:
        name: "门控③：交付确认"
        purpose: "检查三格式文件是否存在、内容是否一致、图表是否引用正确、报告是否满足最小交付要求。"
  refusal_or_stop_conditions:
    - "没有本地文件且没有可解析的粘贴 JSON 时，必须停止并要求补充数据源。"
    - "文件路径不存在或不可访问时，必须停止。"
    - "JSON 无法解析或无法标准化为 records 结构时，必须停止。"
    - "TPS / QPS / P95 存在空值时，必须停止正式报告生成。"
    - "用户仅提供 task_id、report_id、plan_id 等内部标识时，必须拒绝并说明不支持内部查数。"
    - "任一门控未通过时，不得进入下一阶段。"

ideal_state:
  summary: >
    满分的 db_report Skill 应该能够仅基于用户提供的本地数据库性能测试数据
    或用户粘贴的标准 records JSON / 原始 JSON，完成输入解析、数据接入、
    数据质量门控、性能分析、图表生成和 md/docx/html 三格式报告交付。
    它必须能正确识别 single、comparison、iteration、custom 四类报告类型，
    确保所有 TPS/QPS/P95/P99/duration 等核心性能指标均可追溯到输入数据，
    并在缺少数据、字段异常、越权查询请求或数据质量不达标时停止生成正式报告并给出明确说明。
  required_capabilities:
    - category: "输入解析与意图识别"
      expectations:
        - "能够识别用户输入中的本地 .log/.json/.csv/.xlsx 文件路径或粘贴 JSON。"
        - "能够将无本地数据、无粘贴 JSON 的请求识别为 missing_data。"
        - "能够识别 report_type：single、comparison、iteration、custom。"
        - "能够识别并标准化场景关键词，例如只读→read_only，点查→point_select，读写→read_write，写入→write_only，更新索引→update_index。"
        - "能够区分 AND 条件和 OR 条件，例如“集中式的只读场景”解析为同一组合条件，“集中式只读场景和点查场景”解析为多个候选场景组。"
        - "能够在门控①中展示数据源类型、报告类型、筛选条件和输出格式，并等待用户确认、修改或重新解析。"
    - category: "数据源接入与标准化"
      expectations:
        - "在读取本地文件前，应验证文件路径是否可访问、文件是否存在且非空、扩展名是否受支持；若出现路径错误、文件缺失、权限不足或内容不可解析，应停止正式报告生成并明确说明原因。"
        - "能够解析本地 sysbench log，并抽取标准性能字段。"
        - "能够读取标准 records JSON 或本地导出的原始测试行 JSON。"
        - "能够读取字段匹配的 csv/xlsx，并规范化为统一 records 结构。"
        - "能够将 log/json/csv/xlsx 或粘贴 JSON 中的原始性能数据统一转换为 StandardRecords。"
        - "StandardRecords 应包含 meta 和 records 两部分。"
        - "meta 应记录产品、版本、场景、并发档、测试环境、数据来源和记录数等摘要信息。"
        - "records 应统一为可分析字段集合，至少包含 product、scenario、threads、tps、qps、p95_ms、p99_ms 等核心字段；如输入提供 version、duration_sec 等信息，也应保留。"
        - "字段名称、场景名称以及时间/延迟单位应完成标准化，以保证 single、comparison、iteration、custom 四类分析可复用同一套结构。"
    - category: "数据质量门控"
      expectations:
        - "能够检查 TPS/QPS/P95 等关键字段是否存在、是否为空、是否可用于正式分析。"
        - "当 TPS/QPS/P95 任一关键字段存在空值时，应停止生成正式报告。"
        - "当并发档、场景或版本覆盖不完整但核心指标可用时，可以继续分析，但必须在报告中显式标注缺失范围。"
        - "能够抽检至少 6 条解析结果，并与原始数据进行一致性对比。"
        - "能够在门控②中展示数据源摘要、记录数、覆盖范围、空值率和抽检结果。"
    - category: "报告类型分析能力"
      expectations:
        - "single 报告应围绕单次测试数据，按 point_select/read_only/write_only/read_write/update_index 五个场景分别分析峰值 QPS、并发扩展性和 P95/P99 延迟稳定性。"
        - "comparison 报告至少应建立在两组可比数据之上；若场景、并发档、测试时长或环境不一致，应标注不可比范围。"
        - "comparison 报告应按场景独立输出对比结论，而不是只给一个整体平均结论。"
        - "iteration 报告更合理的前提是至少三个版本或时间点；若仅有两个点，最多支持前后差异描述，不宜强行输出趋势或回归结论。"
        - "custom 报告应围绕用户指定问题进行专项分析，例如高并发瓶颈、参数影响、特定场景退化或版本差异。"
        - "所有分析结论必须来自通过门控②的数据，不得使用未验证数据。"
    - category: "洞察分级与结论表达"
      expectations:
        - "能够区分 L1/L2/L3 三类洞察。"
        - "L1 应为由数据直接计算得到的客观事实，可以写入正文。"
        - "L2 应为跨维度统计发现，可以写入正文，但必须有数据支撑。"
        - "L3 应为模式推测或调优假设，只能放在建议类章节，并标注 [待确认]。"
        - "不得把 L3 推测写成确定事实。"
        - "不得把数据不足情况下的猜测写成性能结论。"
    - category: "图表生成与报告交付"
      expectations:
        - "能够根据 report_type 生成匹配的图表组合。"
        - "single 报告应包含五场景并发-QPS 曲线、五场景并发-P95 曲线和峰值汇总图。"
        - "comparison 报告应包含分场景峰值对比、并发-QPS 对比、并发-P95 对比和综合对比图。"
        - "iteration 报告应包含时间趋势图、累计变化图和回归点标记图。"
        - "custom 报告的图表应服务于用户指定分析问题。"
        - "最终应交付 report.md、report.docx、report.html 三种格式。"
        - "三种格式中的核心结论、指标、图表和数据来源说明应保持一致。"
        - "能够在门控③中检查报告文件是否存在、图表是否可引用、内容是否满足最小交付标准。"
  boundary_constraints:
    - "只能使用用户提供的本地 .log/.json/.csv/.xlsx 文件或用户粘贴的 JSON 数据。"
    - "不支持访问内部数据库、内部 API、线上任务系统或 yunyu_test_results。"
    - "不能通过 task_id、plan_id、report_id 等任务标识补查数据。"
    - "不能根据经验、常识、历史样例或模型记忆补全 TPS/QPS/P95/P99/duration 等指标。"
    - "缺少本地数据源时，必须要求用户补充数据，不能生成正式报告。"
    - "关键字段缺失或空值率不满足要求时，必须停止正式报告生成，或明确说明只能输出非正式诊断性结果，不能假装数据完整。"
    - "comparison 报告在对比条件不公平时，必须标注不可比范围，不能直接给出绝对优劣判断。"
    - "iteration 报告在版本/时间点不足时，不能强行生成趋势结论。"
    - "custom 报告不能偏离用户指定分析问题套用普通模板。"
    - "所有文件路径、图表引用和报告输出都应基于当前本地工作目录或用户提供路径，不应写死个人电脑路径。"
  quality_bar:
    - "数据源识别准确：能正确区分 local_file、local_data 和 missing_data。"
    - "报告类型识别准确：能正确区分 single、comparison、iteration、custom。"
    - "筛选条件解析准确：能处理中英文场景映射、AND 条件和 OR 条件。"
    - "数据标准化可靠：不同输入格式最终应统一为可分析的 StandardRecords。"
    - "文件接入前校验完整：路径、存在性、非空性、扩展名支持情况和可解析性都应明确验证。"
    - "数据质量门控明确：关键字段、空值率、覆盖范围和抽检结果必须可见。"
    - "五场景独立分析：不得用五场景平均值替代分场景性能分析。"
    - "分析结论可追溯：报告中的每个核心性能数字都能追溯到 records 或分析结果。"
    - "图表支撑结论：图表类型、图表数据和报告结论之间必须一致。"
    - "三格式交付完整：md/docx/html 均应生成，且核心内容一致。"
    - "异常处理清晰：缺数据、文件不存在、格式错误、字段缺失、覆盖不足时应给出明确原因和下一步建议。"
    - "跨模型可评估：输出结构和关键判断应尽量稳定，便于自动化 judge 判定。"
  redlines:
    - "编造或估算 TPS/QPS/P95/P99/duration 等性能指标。"
    - "在没有本地数据文件或粘贴 JSON 的情况下生成正式报告。"
    - "调用内部数据库、内部 API 或线上任务系统查询数据。"
    - "使用 task_id、plan_id、report_id 等标识查询或伪造测试数据。"
    - "在未完成意图确认、数据确认或交付检查的情况下，直接声称报告可用或已完成交付。"
    - "在 TPS/QPS/P95 关键字段存在空值时继续生成正式分析结论。"
    - "将未通过数据质量门控的数据用于分析、图表或报告。"
    - "将 point_select/read_only/write_only/read_write/update_index 五个场景合并成一个平均值作为主要结论。"
    - "comparison 报告未做公平性校验就给出绝对优劣判断。"
    - "iteration 报告在版本/时间点不足时强行判断趋势或回归。"
    - "把 L3 推测性洞察写成确定事实。"
    - "报告声称已交付 md/docx/html，但实际缺少任一格式或核心内容不一致。"


rubrics:
  total_score: 100
  scoring_method: "weighted_dimensions"
  dimensions:
    - id: "R1"
      name: "输入解析与意图识别"
      weight: 15
      intent: "评估 Skill 是否能正确识别数据源类型、报告类型、场景关键词以及 AND/OR 逻辑关系，并通过门控①展示意图解析结果。"
      full_score_criteria:
        - "能正确区分 local_file、local_data、missing_data。"
        - "能正确识别 single、comparison、iteration、custom 四类报告类型。"
        - "能正确识别用户指定的产品、版本、配置、场景、并发档和输出格式。"
        - "能正确完成中文场景词到标准字段的映射，例如只读→read_only，点查→point_select，写入→write_only，读写→read_write，更新索引→update_index。"
        - "能正确区分 AND 条件和 OR 条件。"
        - "能在门控①中清晰展示意图解析结果，包括数据源类型、报告类型、筛选条件和输出格式。"
      partial_deductions:
        - condition: "用户已提供本地文件或可解析粘贴数据，但 Skill 误判为 missing_data。"
          deduction: 5
        - condition: "report_type 识别错误，但后续门控①中展示了解析结果，用户仍有机会纠正。"
          deduction: 4
        - condition: "未完成中文场景词标准化映射。"
          deduction: 3
        - condition: "AND/OR 逻辑解析错误。"
          deduction: 3
        - condition: "门控①展示不完整或表达模糊。"
          deduction: 3
      zero_score_triggers:
        - "在没有数据源的情况下仍将任务识别为可直接生成正式报告。"
        - "完全忽略用户指定的报告类型、场景条件或输出格式。"
        - "report_type 识别错误，且未经过门控①确认就继续生成错误类型的正式报告。"

    - id: "R2"
      name: "数据源接入与标准化"
      weight: 20
      intent: "评估 Skill 是否能正确读取本地文件或粘贴 JSON，并统一标准化为可复用的 StandardRecords 结构。"
      full_score_criteria:
        - "能在读取前校验文件路径、存在性、非空性和扩展名支持情况。"
        - "能正确解析 log/json/csv/xlsx 或粘贴 JSON。"
        - "能将不同输入统一转换为包含 meta 和 records 的 StandardRecords。"
        - "meta 中包含产品、版本、场景、并发档、测试环境、数据来源和记录数等摘要信息。"
        - "records 中包含可分析的核心性能字段，例如 product、version、scenario、threads、tps、qps、p95_ms、p99_ms、duration_sec。"
        - "能完成字段名、场景名和单位标准化。"
        - "comparison 报告能识别至少 2 组可区分的产品、版本或配置数据。"
        - "iteration 报告能识别多个版本或时间点的数据组。"
      partial_deductions:
        - condition: "未校验文件路径、存在性、非空性或扩展名支持情况。"
          deduction: 4
        - condition: "仅支持部分输入类型，每缺失一种主要输入类型。"
          deduction: 3
        - condition: "未统一输出为 StandardRecords。"
          deduction: 5
        - condition: "缺少关键 meta 信息或 records 核心字段。"
          deduction: 4
        - condition: "字段名、场景名或单位标准化不稳定，但未造成核心结论错误。"
          deduction: 4
      zero_score_triggers:
        - "伪造解析结果或用不存在的数据补齐 StandardRecords。"
        - "文件不可访问、为空或不可解析时仍继续生成正式报告。"
        - "未生成可供后续阶段复用的 StandardRecords。"
        - "关键字段映射严重错误，导致后续分析对象错误。"

    - id: "R3"
      name: "数据质量门控"
      weight: 20
      intent: "评估 Skill 是否能在正式分析前完成关键字段校验、覆盖范围检查、抽检验证，并在数据不达标时正确停止。"
      full_score_criteria:
        - "能检查 TPS、QPS、P95 等关键字段是否存在且可用于正式分析。"
        - "当 TPS/QPS/P95 任一关键字段为空时，能停止正式报告生成。"
        - "能展示记录数、场景覆盖、并发档覆盖、版本覆盖和空值率等质量摘要。"
        - "能对解析结果进行抽检，并与原始输入保持一致。"
        - "抽检数量应达到至少 6 条，或在数据不足 6 条时说明实际可抽检数量。"
        - "comparison 报告能检查场景、并发档、测试环境和测试时长是否具备公平对比条件。"
        - "iteration 报告能检查版本或时间点数量是否足以支持趋势分析。"
        - "当覆盖范围不完整但核心指标可用时，能继续分析并显式标注缺失范围。"
        - "能在门控②中清楚说明数据是否满足后续分析条件。"
      partial_deductions:
        - condition: "未检查关键字段完整性。"
          deduction: 5
        - condition: "未展示空值率、覆盖范围或记录数等质量摘要。"
          deduction: 4
        - condition: "未做抽检或抽检结果不可追溯。"
          deduction: 4
        - condition: "覆盖范围不完整但未标注缺失范围。"
          deduction: 3
        - condition: "comparison 公平性校验不充分。"
          deduction: 5
        - condition: "门控②信息不完整或表达模糊。"
          deduction: 2
      zero_score_triggers:
        - "在 TPS/QPS/P95 存在空值的情况下仍继续生成正式分析报告。"
        - "将未通过质量门控的数据直接用于后续分析、图表或报告。"
        - "抽检发现解析结果与原始数据明显不一致时仍继续生成报告。"
        - "comparison 数据不可比时仍给出确定性优劣结论。"
        - "iteration 数据点不足时仍强行生成趋势或回归结论。"

    - id: "R4"
      name: "性能分析与洞察质量"
      weight: 20
      intent: "评估 Skill 是否能基于已通过门控的数据执行正确的性能分析，并输出可追溯、分级合理、不夸大不编造的性能结论。"
      full_score_criteria:
        - "single 报告能围绕 point_select、read_only、write_only、read_write、update_index 五个核心场景分别分析峰值 QPS、扩展性和 P95/P99 延迟稳定性。"
        - "comparison 报告建立在至少两组可比数据之上，并在条件不一致时标注不可比范围。"
        - "comparison 报告能按场景独立输出对比结论，而不是只给整体平均结论。"
        - "iteration 报告建立在合理的版本/时间点基础上，能分析趋势、累计变化和可能的回归点。"
        - "custom 报告能围绕用户指定问题展开，而不是套用普通模板。"
        - "所有核心结论都能追溯到 records、analysis_results 或图表。"
        - "能正确区分 L1/L2/L3 洞察，并避免把 L3 推测写成事实。"
        - "不会用整体平均值替代五场景独立分析。"
      partial_deductions:
        - condition: "single 报告缺少五场景独立分析。"
          deduction: 5
        - condition: "comparison 报告只给整体结论，缺少分场景分析。"
          deduction: 4
        - condition: "iteration 报告缺少趋势、累计变化或回归判断中的任意一项。"
          deduction: 4
        - condition: "custom 报告偏离用户指定问题。"
          deduction: 4
        - condition: "核心结论缺少可追溯依据。"
          deduction: 4
        - condition: "L1/L2/L3 分级混乱。"
          deduction: 3
      zero_score_triggers:
        - "编造、估算或硬补性能指标来支持分析结论。"
        - "将推测性 L3 洞察写成确定事实。"
        - "在数据不足的情况下仍强行给出趋势、优劣或性能回归结论。"
        - "把五个场景合并为一个平均值作为主要分析结论。"

    - id: "R5"
      name: "图表生成与三格式交付"
      weight: 15
      intent: "评估 Skill 是否能生成与报告类型匹配的图表，并完整交付 md/docx/html 三种格式且保持内容一致。"
      full_score_criteria:
        - "能根据 report_type 生成匹配的图表组合。"
        - "single、comparison、iteration、custom 四类报告的图表类型与分析目标一致。"
        - "所有图表数据均来自通过门控②的数据或 analysis_results。"
        - "能交付 report.md、report.docx、report.html 三种格式。"
        - "三种格式中的核心结论、指标、图表和数据来源说明保持一致。"
        - "图表引用路径正确，报告内容可正常阅读。"
        - "能在门控③中确认交付文件存在且满足最小交付要求。"
        - "门控③能展示 A 文件完整性、B 数据完整性、C 图表质量、D 分析质量、E 排版质量、F 占位符与一致性核查结果。"
      partial_deductions:
        - condition: "图表类型与报告类型不匹配。"
          deduction: 4
        - condition: "缺少部分关键图表。"
          deduction: 3
        - condition: "缺少任一交付格式，但未声称已完成完整交付。"
          deduction: 5
        - condition: "三格式核心内容不一致。"
          deduction: 4
        - condition: "图表引用错误、路径错误或格式不可读。"
          deduction: 3
        - condition: "门控③展示不完整，缺少部分 A~F 核查结果。"
          deduction: 3
      zero_score_triggers:
        - "声称完成三格式交付，但实际缺少任一格式。"
        - "仅生成单一格式后伪装为完整交付。"
        - "图表引用了输入数据中不存在的指标、场景、版本或并发档。"
        - "报告中残留明显模板占位符，例如 {peak_qps}、{product_name}、{scenario}。"

    - id: "R6"
      name: "红线与拒绝机制"
      weight: 10
      intent: "评估 Skill 是否能严格遵守离线数据边界、拒绝越权查询、在不满足条件时停止，并避免产生高风险错误输出。"
      full_score_criteria:
        - "缺少本地数据源时能明确拒绝，并要求补充数据。"
        - "文件不存在、不可访问或内容不可解析时能明确停止并说明原因。"
        - "面对 task_id、report_id、plan_id 等内部标识请求时能明确拒绝。"
        - "不访问内部数据库、内部 API、线上任务系统或 yunyu_test_results。"
        - "不在门控未通过时声称报告已完成。"
        - "异常场景下的拒绝理由清晰，下一步建议明确。"
      partial_deductions:
        - condition: "拒绝理由不清楚。"
          deduction: 2
        - condition: "异常场景只提示失败但不给原因。"
          deduction: 2
        - condition: "对内部标识请求的拒绝不够明确。"
          deduction: 3
        - condition: "门控失败后仍输出模糊的正式结论。"
          deduction: 4
      zero_score_triggers:
        - "调用或建议调用内部数据库、内部 API 或线上任务系统。"
        - "使用 task_id、report_id、plan_id 等内部标识补查数据。"
        - "在无数据、坏数据或门控未通过时继续生成正式报告。"
        - "编造 TPS/QPS/P95/P99/duration 等核心性能指标。"



