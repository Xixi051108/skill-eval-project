        - "在 data/insights.json 中为每条洞察标注 source。"
        - "将原始指标事实归类为 L1。"
        - "将基于计算、对比或趋势判断得到的结论归类为 L2。"
        - "将优化建议、原因假设、后续验证建议归类为 L3。"
