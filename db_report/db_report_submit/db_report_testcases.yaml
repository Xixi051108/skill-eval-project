  - id: "DB-03"
    title: "iteration 历史趋势报告端到端生成"
    priority: "P0"
    tags:
      - "happy_path"
      - "local_json"
      - "iteration_report"
      - "trend_analysis"
      - "regression_detection"
      - "end_to_end"
      - "three_format_delivery"
    objective: "验证 Skill 在用户提供题目 test-resource 中的历史迭代 records JSON 文件时，能够正确识别 iteration 报告类型，基于相同场景、相同并发档和相同测试口径分析多个版本的性能趋势，识别性能提升与回退点，并生成趋势分析结果、洞察、图表以及 report.md、report.docx、report.html 三格式报告。"
    input:
      user_request: "请基于 test-resource/mock_iteration_history.json 生成一份 TDSQL-B 历史迭代性能趋势报告，分析 v22.6、v22.7、v22.8、v22.9 四个版本在五个 OLTP 场景下的性能变化，并输出 report.md、report.docx、report.html 三种格式。"
      files:
        - "test-resource/mock_iteration_history.json"
      pasted_data: ""
      skill_specific_input:
        expected_input_mode: "local_file"
        expected_file_type: "json"
        expected_report_type: "iteration"
        expected_products:
          - "TDSQL-B v22.6"
          - "TDSQL-B v22.7"
          - "TDSQL-B v22.8"
          - "TDSQL-B v22.9"
        expected_version_count: 4
        expected_scenarios:
          - "oltp_point_select"
          - "oltp_read_only"
          - "oltp_read_write"
          - "oltp_write_only"
          - "oltp_update_index"
        expected_scenario_count: 5
        expected_concurrencies:
          - 32
          - 64
          - 128
          - 256
          - 512
          - 1000
        expected_concurrency_count: 6
        expected_record_count: 120
        expected_chart_min_count: 12
        expected_output_formats:
          - "md"
          - "docx"
          - "html"
    expected_output:
      task_understanding:
        - "识别当前任务是数据库性能历史迭代趋势报告生成请求。"
        - "识别用户提供了本地 JSON 文件 test-resource/mock_iteration_history.json。"
        - "识别输入文件是历史迭代 records JSON。"
        - "识别输入模式为 local_file。"
        - "识别报告类型为 iteration。"
        - "识别历史版本为 TDSQL-B v22.6、TDSQL-B v22.7、TDSQL-B v22.8、TDSQL-B v22.9。"
        - "识别用户要求输出 report.md、report.docx、report.html 三种格式。"
      required_actions:
        - "读取 test-resource/mock_iteration_history.json。"
        - "解析 meta.products、meta.scenarios、meta.concurrencies、meta.log_meta、meta.source_info 和 records。"
        - "生成 data/intent.json，且 report_type 为 iteration。"
        - "生成 data/extracted_data.json，且 records 数量为 120。"
        - "生成 data/data_quality_summary.json，且 TPS/QPS/P95 空值率为 0%。"
        - "检查四个版本是否覆盖相同场景、相同并发档、相同测试时长和相同数据集口径。"
        - "生成 data/analysis_results.json，且包含 iteration 趋势分析结果。"
        - "按场景分析 v22.6 到 v22.9 的峰值 QPS 趋势。"
        - "识别 v22.8 到 v22.9 之间的性能回退场景。"
        - "生成 data/insights.json，且 iteration 相关 insight 包含 level 和 source。"
        - "生成历史趋势图、版本对比图和回归点标记图。"
        - "生成 report.md、report.docx、report.html 三格式报告。"
      required_content:
        - "报告中必须出现 TDSQL-B v22.6、TDSQL-B v22.7、TDSQL-B v22.8、TDSQL-B v22.9 四个版本。"
        - "报告中必须覆盖 oltp_point_select、oltp_read_only、oltp_read_write、oltp_write_only、oltp_update_index 五个场景。"
        - "报告中必须覆盖 32、64、128、256、512、1000 六个并发档。"
        - "报告中必须包含 TPS、QPS、P95、P99 核心性能指标。"
        - "报告中必须按相同 scenario 和相同 threads 比较不同版本，不得跨场景或跨并发档直接比较。"
        - "报告中必须包含四个版本的峰值 QPS 趋势分析。"
        - "报告中必须指出 oltp_read_only 在 v22.8 到 v22.9 之间出现峰值 QPS 回退。"
        - "报告中必须指出 oltp_read_write 在 v22.8 到 v22.9 之间出现峰值 QPS 回退。"
        - "报告中必须说明数据来源为 test-resource/mock_iteration_history.json。"
        - "报告中不得包含未替换的模板占位符。"
      skill_specific_expectation:
        stop_stage: "completed"
        expected_outputs:
          - "data/intent.json"
          - "data/extracted_data.json"
          - "data/data_quality_summary.json"
          - "data/analysis_results.json"
          - "data/insights.json"
          - "charts/*"
          - "report.md"
          - "report.docx"
          - "report.html"
        forbidden_outputs:
          - "内部数据库查询结果"
          - "内部 API 查询结果"
          - "线上任务系统查询结果"
          - "根据 task_id/report_id/plan_id 补查得到的 records"
      data_expectation:
        source_info:
          type: "local_file"
          value: "test-resource/mock_iteration_history.json"
          rows_fetched: 120
        record_count: 120
        versions:
          - "TDSQL-B v22.6"
          - "TDSQL-B v22.7"
          - "TDSQL-B v22.8"
          - "TDSQL-B v22.9"
        scenarios:
          - "oltp_point_select"
          - "oltp_read_only"
          - "oltp_read_write"
          - "oltp_write_only"
          - "oltp_update_index"
        concurrencies:
          - 32
          - 64
          - 128
          - 256
          - 512
          - 1000
        required_non_null_fields:
          - "tps"
          - "qps"
          - "p95_ms"
          - "p99_ms"
        traceable_metric_examples:
          - product: "TDSQL-B v22.6"
            scenario: "oltp_point_select"
            threads: 512
            metric: "qps"
            expected_value: 79274.90
          - product: "TDSQL-B v22.9"
            scenario: "oltp_point_select"
            threads: 512
            metric: "qps"
            expected_value: 87702.72
          - product: "TDSQL-B v22.8"
            scenario: "oltp_read_only"
            threads: 512
            metric: "qps"
            expected_value: 51672.30
          - product: "TDSQL-B v22.9"
            scenario: "oltp_read_only"
            threads: 512
            metric: "qps"
            expected_value: 40809.21
          - product: "TDSQL-B v22.8"
            scenario: "oltp_read_write"
            threads: 512
            metric: "qps"
            expected_value: 44114.88
          - product: "TDSQL-B v22.9"
            scenario: "oltp_read_write"
            threads: 512
            metric: "qps"
            expected_value: 41135.99
        expected_trend_checks:
          - scenario: "oltp_point_select"
            comparison: "v22.6_to_v22.9_peak_qps"
            expected_direction: "increase"
            expected_change_percent_approx: 10.63
          - scenario: "oltp_read_only"
            comparison: "v22.8_to_v22.9_peak_qps"
            expected_direction: "decrease"
            expected_change_percent_approx: -21.02
          - scenario: "oltp_read_write"
            comparison: "v22.8_to_v22.9_peak_qps"
            expected_direction: "decrease"
            expected_change_percent_approx: -6.75
    judge:
      pass_if_all:
        - "生成 data/intent.json，且 report_type 为 iteration。"
        - "生成 data/extracted_data.json，且 source_info.type 为 local_file。"
        - "data/extracted_data.json 中 source_info.value 指向 test-resource/mock_iteration_history.json。"
        - "data/extracted_data.json 中 records 数量为 120。"
        - "data/extracted_data.json 中包含 TDSQL-B v22.6、TDSQL-B v22.7、TDSQL-B v22.8、TDSQL-B v22.9 四个版本。"
        - "data/extracted_data.json 中包含 oltp_point_select、oltp_read_only、oltp_read_write、oltp_write_only、oltp_update_index 五个场景。"
        - "data/extracted_data.json 中每个版本在每个场景下均覆盖 32、64、128、256、512、1000 六个并发档。"
        - "data_quality_summary.json 或等价数据质量摘要明确显示 TPS/QPS/P95 空值率为 0%。"
        - "生成 data/analysis_results.json，且 report_type 为 iteration。"
        - "analysis_results.json 中包含 iteration_trend 或等价历史趋势分析字段。"
        - "analysis_results.json 或报告正文中包含版本级趋势分析，而不是仅做单版本分析。"
        - "analysis_results.json 或报告正文中按相同 scenario 和相同 threads 对比不同版本。"
        - "analysis_results.json 或报告正文中能追溯 TDSQL-B v22.6 在 oltp_point_select、threads=512 时 qps=79274.90。"
        - "analysis_results.json 或报告正文中能追溯 TDSQL-B v22.9 在 oltp_point_select、threads=512 时 qps=87702.72。"
        - "analysis_results.json 或报告正文中指出 oltp_point_select 从 v22.6 到 v22.9 峰值 QPS 提升。"
        - "analysis_results.json 或报告正文中能追溯 TDSQL-B v22.8 在 oltp_read_only、threads=512 时 qps=51672.30。"
        - "analysis_results.json 或报告正文中能追溯 TDSQL-B v22.9 在 oltp_read_only、threads=512 时 qps=40809.21。"
        - "analysis_results.json 或报告正文中指出 oltp_read_only 从 v22.8 到 v22.9 峰值 QPS 回退。"
        - "analysis_results.json 或报告正文中能追溯 TDSQL-B v22.8 在 oltp_read_write、threads=512 时 qps=44114.88。"
        - "analysis_results.json 或报告正文中能追溯 TDSQL-B v22.9 在 oltp_read_write、threads=512 时 qps=41135.99。"
        - "analysis_results.json 或报告正文中指出 oltp_read_write 从 v22.8 到 v22.9 峰值 QPS 回退。"
        - "生成 data/insights.json，且 iteration 相关 insight 每条包含 level 和 source。"
        - "charts/ 下至少生成 12 张 iteration 趋势图表。"
        - "charts/ 中包含五个场景的版本-峰值 QPS 趋势图。"
        - "charts/ 中包含五个场景的版本-P95 趋势图。"
        - "charts/ 中包含性能回退或趋势汇总图。"
        - "生成 report.md、report.docx、report.html。"
        - "存在最小交付检查结果或等价的门控③核查结果，且能够证明三格式文件存在、图表可引用、核心内容满足最小交付要求。"
        - "analysis_results.json、data/intent.json 或报告正文中明确说明四个版本的趋势比较基于相同 scenario、相同 threads、相同测试时长和相同数据集口径。"
        - "report.md、report.docx、report.html 三种格式中均出现 TDSQL-B v22.6、TDSQL-B v22.7、TDSQL-B v22.8、TDSQL-B v22.9。"
        - "report.md、report.docx、report.html 三种格式中的核心 TPS/QPS/P95/P99 数值一致。"
        - "report.md 或 report.html 中引用 charts/ 下的相对图表路径。"
        - "report.md 和 report.html 中不存在形如 {xxx} 的模板占位符残留。"
        - "未调用、建议调用或模拟调用内部数据库、内部 API、线上任务系统。"
        - "未根据 records 中的 task_id 补查或伪造数据。"
      fail_if_any:
        - "未生成 report.md、report.docx、report.html 中任意一种格式。"
        - "未生成 data/intent.json、data/extracted_data.json、data/analysis_results.json 或 data/insights.json。"
        - "将 iteration 报告误判为 single、comparison 或 custom。"
        - "data/extracted_data.json 中 records 数量不是 120。"
        - "data/extracted_data.json 缺少 TDSQL-B v22.6、TDSQL-B v22.7、TDSQL-B v22.8、TDSQL-B v22.9 任一版本。"
        - "data/extracted_data.json 缺少 TPS、QPS、P95、P99 任一核心指标字段。"
        - "data_quality_summary.json 或等价数据质量摘要显示 TPS/QPS/P95 任一空值率大于 0%。"
        - "只分析单个版本，未形成历史 iteration 趋势。"
        - "只输出四个版本的总体平均值，未按五个场景分别分析趋势。"
        - "把不同场景的数据混合后直接比较版本趋势。"
        - "把不同并发档的数据混合后直接比较版本趋势。"
        - "未校验或未说明四个版本是否具备相同 scenario、相同 threads、相同测试时长和相同数据集口径，就直接输出趋势结论。"
        - "未识别 oltp_read_only 从 v22.8 到 v22.9 的峰值 QPS 回退。"
        - "未识别 oltp_read_write 从 v22.8 到 v22.9 的峰值 QPS 回退。"
        - "未生成 iteration 趋势图表。"
        - "charts/ 下 iteration 报告图表数量少于 12 张。"
