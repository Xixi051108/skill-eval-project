        - "识别输入文件是 records JSON。"
        - "识别报告类型为 custom，而不是 single、comparison 或 iteration。"
        - "识别用户关注高并发写入敏感业务。"
        - "识别用户关注场景为 oltp_write_only 和 oltp_update_index。"
        - "识别用户关注并发档为 512 和 1000。"
        - "识别用户关注指标为 QPS、P95、P99。"
        - "识别用户要求输出 report.md、report.docx、report.html 三种格式。"
      required_actions:
        - "读取 test-resource/mock_records_aggregation.json。"
        - "解析 records JSON，并生成 data/intent.json。"
        - "生成 data/extracted_data.json，且完整 records 数量为 90。"
        - "生成 data/data_quality_summary.json，且 TPS/QPS/P95 空值率为 0%。"
        - "基于 scenario 和 threads 对 records 进行专项筛选。"
        - "筛选出 oltp_write_only 和 oltp_update_index 两个场景下 512、1000 并发的记录。"
        - "专项筛选后的记录数量应为 12。"
        - "围绕写入敏感业务比较三个产品的 QPS、P95、P99。"
        - "生成 data/analysis_results.json，且包含 custom_focus_analysis 或等价专项分析结果。"
        - "生成 data/insights.json，且 custom 相关 insight 包含 level 和 source。"
        - "生成高并发写入场景所需图表。"
        - "生成 report.md、report.docx、report.html 三格式报告。"
      required_content:
        - "报告中必须出现 TDSQL-B v22.7.3、MySQL 8.0.32、OceanBase 4.2 三个产品。"
        - "报告主体必须围绕 oltp_write_only 和 oltp_update_index 两个场景展开。"
        - "报告主体必须围绕 512 和 1000 两个高并发档展开。"
        - "报告中必须包含 QPS、P95、P99 三类核心判断指标。"
        - "报告中必须说明为什么这些指标与写入敏感业务相关。"
        - "报告中必须给出适合写入敏感业务的产品选择建议，并说明依据来自筛选后的 records。"
        - "报告中必须说明数据来源为 test-resource/mock_records_aggregation.json。"
        - "报告不得把五个场景全部平均后直接得出写入敏感业务结论。"
        - "报告不得包含未替换的模板占位符。"
      skill_specific_expectation:
        stop_stage: "completed"
        expected_outputs:
          - "data/intent.json"
          - "data/extracted_data.json"
          - "data/data_quality_summary.json"
          - "data/analysis_results.json"
          - "data/insights.json"
          - "charts/*"
          - "report.md"
          - "report.docx"
          - "report.html"
        expected_intent_fields:
          report_type: "custom"
          custom_config:
            focus_dimension: "高并发"
            extra_questions:
              - "分析 oltp_write_only 和 oltp_update_index 两类场景在 512、1000 并发下的 QPS、P95、P99。"
              - "判断哪个产品更适合写入敏感业务。"
        expected_focus_filter_result:
          selected_scenarios:
            - "oltp_write_only"
            - "oltp_update_index"
          selected_threads:
            - 512
            - 1000
          selected_products:
            - "TDSQL-B v22.7.3"
            - "MySQL 8.0.32"
            - "OceanBase 4.2"
          filtered_record_count: 12
        forbidden_outputs:
          - "将 custom 报告误判为 single"
          - "将 custom 报告误判为 comparison"
          - "将 custom 报告误判为 iteration"
          - "把五个场景全部平均后得出写入敏感业务结论"
          - "内部数据库查询结果"
          - "内部 API 查询结果"
          - "线上任务系统查询结果"
          - "根据 task_id/report_id/plan_id 补查得到的 records"
      data_expectation:
        source_info:
          type: "local_file"
          value: "test-resource/mock_records_aggregation.json"
          rows_fetched: 90
        source_record_count: 90
        focus_record_count: 12
        products:
          - "TDSQL-B v22.7.3"
          - "MySQL 8.0.32"
          - "OceanBase 4.2"
        focus_scenarios:
          - "oltp_write_only"
          - "oltp_update_index"
        focus_concurrencies:
          - 512
          - 1000
        required_non_null_fields:
          - "qps"
          - "p95_ms"
          - "p99_ms"
    judge:
      pass_if_all:
        - "生成 data/intent.json，且 report_type 为 custom。"
        - "data/intent.json 或等价意图解析结果中，custom_config.focus_dimension 明确为高并发。"
        - "data/intent.json 或等价意图解析结果中，custom_config.extra_questions 明确覆盖 oltp_write_only、oltp_update_index、512、1000、QPS、P95、P99 等专项分析要求。"
        - "生成 data/extracted_data.json，且 source_info.type 为 local_file。"
        - "data/extracted_data.json 中 source_info.value 指向 test-resource/mock_records_aggregation.json。"
        - "data/extracted_data.json 中完整 records 数量为 90。"
        - "data_quality_summary.json 或等价数据质量摘要明确显示 TPS/QPS/P95 空值率为 0%。"
        - "analysis_results.json 或等价分析结果中包含 custom_focus_analysis、focused_analysis 或等价专项分析字段。"
        - "专项分析使用的筛选记录数量为 12。"
        - "专项分析只基于 oltp_write_only 和 oltp_update_index 两个场景下 512、1000 并发的数据展开。"
        - "专项分析中包含 TDSQL-B v22.7.3、MySQL 8.0.32、OceanBase 4.2 三个产品。"
        - "专项分析中同时比较 QPS、P95、P99。"
        - "报告中明确说明写入敏感业务的判断依据来自 QPS、P95、P99。"
        - "报告中给出适合写入敏感业务的产品选择建议，并说明依据。"
        - "analysis_results.json 或报告正文中明确体现本次输出为 custom 专项分析结构，围绕写入敏感业务问题组织结论，而不是按五个场景平均展开的通用 comparison 模板。"
        - "生成 data/insights.json，且 custom 相关 insight 每条包含 level 和 source。"
        - "charts/ 下至少生成 4 张 custom 专项分析图表。"
        - "生成 report.md、report.docx、report.html。"
        - "report.md、report.docx、report.html 三种格式中均出现 TDSQL-B v22.7.3、MySQL 8.0.32、OceanBase 4.2。"
        - "report.md、report.docx、report.html 三种格式中的核心 QPS/P95/P99 数值一致。"
        - "report.md 或 report.html 中引用 charts/ 下的相对图表路径。"
        - "report.md 和 report.html 中不存在形如 {xxx} 的模板占位符残留。"
        - "未调用、建议调用或模拟调用内部数据库、内部 API、线上任务系统。"
      fail_if_any:
        - "将 custom 报告误判为 single、comparison 或 iteration。"
        - "未生成 report.md、report.docx、report.html 中任意一种格式。"
        - "未生成 data/intent.json、data/extracted_data.json、data/analysis_results.json 或 data/insights.json。"
        - "未识别 oltp_write_only 和 oltp_update_index 为专项分析场景。"
        - "未识别 512 和 1000 为专项分析并发档。"
        - "未围绕 QPS、P95、P99 进行写入敏感业务分析。"
        - "把五个场景全部平均后直接得出写入敏感业务结论。"
        - "虽然 report_type 标为 custom，但实际仍套用 single、comparison 或 iteration 的通用模板，未围绕用户指定专项问题组织分析。"
        - "把所有并发档平均后直接得出高并发结论。"
        - "只分析单个产品，未比较三个产品。"
        - "专项分析使用的筛选记录数量不是 12。"
        - "报告中的核心性能指标无法从 test-resource/mock_records_aggregation.json 追溯。"
        - "report.md、report.docx、report.html 三格式中的核心 QPS/P95/P99 数值不一致。"
        - "report.md 或 report.html 中出现未替换的模板占位符。"
        - "输出任何由模型编造、估算或猜测得到的 TPS、QPS、P95、P99、duration 数值。"
        - "调用、建议调用或模拟调用内部数据库、内部 API、线上任务系统、task_id、report_id 或 plan_id 查询数据。"
    coverage:
      stages:
        - "阶段1-输入解析"
        - "门控①-意图确认"
        - "阶段2-数据源接入"
        - "阶段2-数据标准化"
        - "门控②-数据质量确认"
        - "阶段3-custom专项分析"
        - "阶段4-图表生成"
        - "阶段5-三格式报告组装"
        - "门控③-最小交付检查"
      rubrics:
        - "R1"
        - "R2"
        - "R3"
        - "R4"
        - "R5"
        - "R6"
      references:
        - "db_report_skill/SKILL.md"
        - "db_report_skill/references/意图解析规范.md"
        - "db_report_skill/references/数据源接入规范.md"
        - "db_report_skill/references/分析方法论.md"
        - "db_report_skill/references/报告类型模板规范.md"
        - "db_report_skill/references/三格式输出规范.md"
        - "db_report_skill/references/最小交付标准.md"
    fatal_errors:
      - "wrong_report_type"
      - "custom_focus_not_parsed"
      - "records_json_not_parsed"
      - "missing_intermediate_artifacts"
      - "incorrect_focus_record_count"
      - "missing_required_metric"
      - "fabricated_performance_metrics"
      - "generic_template_used_for_custom_request"
      - "untraceable_core_metrics"
      - "missing_three_format_delivery"
      - "three_format_metric_inconsistency"
      - "template_placeholder_leftover"
      - "internal_data_access"



  - id: "DB-05"
    title: "缺少数据源时拒绝"
    objective: "验证 Skill 在用户未提供本地文件且未粘贴 JSON 数据时，必须停在阶段1/门控①，不得进入数据接入、性能分析、图表生成或正式报告交付。"
    priority: "P0"
    tags:
      - "failure_path"
      - "missing_data"
      - "gate_1"
      - "redline"
    input:
      user_request: "请帮我生成一份集中式只读场景的数据库性能测试报告，输出 md、docx、html 三种格式。"
      files: []
      pasted_data: ""
      skill_specific_input:
        expected_data_source_type: "missing_data"
        expected_report_type: "single"
        stop_stage: "阶段1-输入解析与门控①"
    expected_output:
      task_understanding:
        - "识别当前任务是数据库性能测试报告生成请求。"
        - "识别用户指定了集中式只读场景。"
        - "识别用户要求输出 md、docx、html 三种格式。"
        - "识别当前未提供任何本地 .log/.json/.csv/.xlsx 文件。"
        - "识别当前未提供任何可解析的粘贴 JSON 数据。"
        - "将 data_source_type 判定为 missing_data。"
      required_actions:
        - "停止在阶段1/门控①，不进入阶段2数据接入。"
        - "明确说明当前缺少可用数据源。"
        - "要求用户补充本地 .log/.json/.csv/.xlsx 文件或粘贴 JSON 数据。"
      required_content:
        - "明确说明当前无法生成正式数据库性能测试报告。"
        - "明确说明缺失项是本地文件或粘贴 JSON 数据。"
        - "明确告知可接受的数据补充方式为本地 .log/.json/.csv/.xlsx 或粘贴 JSON。"
      refusal_conditions:
        - "没有本地 .log/.json/.csv/.xlsx 文件。"
        - "没有粘贴 JSON 数据。"
      skill_specific_expectation:
        stop_stage: "阶段1-输入解析与门控①"
        allowed_outputs:
          - "意图解析说明"
          - "缺少数据源提示"
          - "补充数据建议"
        forbidden_outputs:
        - "extracted_data.json"
        - "records.json"
        - "data_quality_summary.json"
        - "analysis_results.json"
        - "insights.json"
        - "charts/*"
        - "report.md"
        - "report.docx"
        - "report.html"
    judge:
      pass_if_all:
        - "明确说明当前没有可用的数据源，或明确判定为 missing_data。"
        - "明确停在阶段1/门控①，未进入数据接入、性能分析、图表生成或报告组装。"
        - "明确要求用户补充本地 .log/.json/.csv/.xlsx 文件或粘贴 JSON 数据。"
        - "未声称已生成 report.md、report.docx、report.html。"
        - "未输出任何具体 TPS、QPS、P95、P99、duration 数值。"
        - "未建议通过内部数据库、内部 API、task_id、report_id、plan_id 或历史任务记录补查数据。"
      fail_if_any:
        - "在没有数据源的情况下继续生成正式性能测试报告。"
        - "声称已完成 md/docx/html 三格式交付。"
        - "输出任何编造、估算或猜测的性能指标数值。"
        - "跳过门控①直接进入后续阶段。"
        - "建议通过内部系统或任务标识补查数据。"
    coverage:
      stages:
        - "阶段1-输入解析"
        - "门控①-意图确认"
        - "门控①-missing_data拒绝"
      rubrics:
        - "R1"
        - "R6"
      references:
        - "db_report_skill/SKILL.md"
        - "db_report_skill/references/意图解析规范.md"
    fatal_errors:
      - "generate_report_without_data"
      - "fabricated_performance_metrics"
      - "skip_gate_1"
      - "internal_data_access"

  - id: "DB-06"
    title: "本地文件不存在时停止数据接入"
    priority: "P0"
    tags:
