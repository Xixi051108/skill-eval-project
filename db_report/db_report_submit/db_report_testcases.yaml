        - "明确提示本次失败原因是本地文件不存在。"
        - "要求用户提供正确的本地文件路径或重新上传文件。"
      required_content:
        - "明确说明文件路径 test-resource/not_exist.log 不存在。"
        - "明确说明当前无法生成正式数据库性能测试报告。"
        - "明确说明需要补充正确的本地 .log/.json/.csv/.xlsx 文件。"
        - "如输出错误码，应与 E2001 对齐。"
      refusal_conditions:
        - "用户提供了本地文件路径。"
