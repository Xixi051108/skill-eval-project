      required_actions:
        - "读取 test-resource/mock_iteration_history.json。"
        - "生成 data/intent.json。"
        - "生成 data/extracted_data.json。"
        - "生成 data/data_quality_summary.json。"
        - "生成 data/analysis_results.json。"
