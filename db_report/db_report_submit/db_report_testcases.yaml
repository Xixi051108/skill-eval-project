        - "明确停在阶段2的数据接入前置校验，未进入文件解析、数据标准化、性能分析、图表生成或报告组装。"
        - "明确要求用户提供正确的本地文件路径或重新上传文件。"
        - "未声称已生成 extracted_data.json、records.json 或 data_quality_summary.json。"
        - "未声称已生成 analysis_results.json、insights.json 或 charts/*。"
        - "未声称已生成 report.md、report.docx、report.html。"
        - "未输出任何具体 TPS、QPS、P95、P99、duration 数值。"
        - "未建议通过内部数据库、内部 API、task_id、report_id、plan_id 或历史任务记录补查数据。"
      fail_if_any:
        - "在文件不存在的情况下继续读取或解析文件内容。"
        - "在文件不存在的情况下生成 extracted_data.json、records.json 或 data_quality_summary.json。"
        - "在文件不存在的情况下生成 analysis_results.json、insights.json 或 charts/*。"
        - "在文件不存在的情况下声称已完成 md/docx/html 三格式交付。"
        - "输出任何编造、估算或猜测的性能指标数值。"
        - "跳过阶段2前置校验直接进入后续阶段。"
        - "建议通过内部系统或任务标识补查数据。"
