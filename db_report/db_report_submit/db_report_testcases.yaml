      - "file_not_found"
      - "local_file_candidate"
      - "stage_2_precheck"
    objective: "验证 Skill 在用户提供了本地文件路径但目标文件不存在时，必须在阶段2的数据接入前置校验处停止，不得继续进入文件解析、数据标准化、性能分析、图表生成或正式报告交付。"
