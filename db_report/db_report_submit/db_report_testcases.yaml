        - "L3 洞察不得写成确定事实。"
        - "L3 洞察必须包含 [待确认] 或等价风险边界提示。"
        - "报告中必须把 L3 内容放在洞察建议、优化建议、风险提示或后续验证章节。"
        - "报告中的核心 L1/L2 指标和结论必须能追溯到中间产物。"
