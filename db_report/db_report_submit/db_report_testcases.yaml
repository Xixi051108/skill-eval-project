testcases:
  - id: "DB-01"
    title: "本地 log 单次性能报告端到端生成"
    priority: "P0"
    tags:
      - "happy_path"
      - "local_log"
      - "single_report"
      - "end_to_end"
      - "three_format_delivery"
    objective: "验证 Skill 在用户提供存在的本地 sysbench log 文件时，能够正确识别 single 报告类型，完成数据接入、标准化、质量检查、性能分析、图表生成和 md/docx/html 三格式报告交付，并保证核心性能指标可追溯到原始 log。"
    input:
      user_request: "请基于 test-resource/mock_tdsqlb_v22_7_2.log 生成一份数据库性能测试报告，报告类型按 single 单次测试报告处理，并输出 report.md、report.docx、report.html 三种格式。"
      files:
        - "test-resource/mock_tdsqlb_v22_7_2.log"
      pasted_data: ""
      skill_specific_input:
        expected_input_mode: "local_file"
        expected_file_type: "log"
        expected_report_type: "single"
        expected_product_family:
          - "TDSQL-B"
        expected_version:
          - "v22.7.2"
        expected_scenarios:
          - "oltp_point_select"
          - "oltp_read_only"
          - "oltp_read_write"
          - "oltp_write_only"
          - "oltp_update_index"
        expected_concurrencies:
          - 32
          - 64
          - 128
          - 256
          - 512
          - 1000
        expected_record_count: 30
        expected_chart_min_count: 11
        expected_output_formats:
          - "md"
          - "docx"
          - "html"
    expected_output:
      task_understanding:
        - "识别当前任务是数据库性能测试报告生成请求。"
        - "识别用户提供了本地 log 文件 test-resource/mock_tdsqlb_v22_7_2.log。"
        - "识别输入模式为 local_file。"
        - "识别文件类型为 log。"
        - "识别报告类型为 single。"
        - "识别用户要求输出 report.md、report.docx、report.html 三种格式。"
      required_actions:
        - "读取 test-resource/mock_tdsqlb_v22_7_2.log。"
        - "解析 sysbench log 中的产品、场景、并发、TPS、QPS、P95、P99、duration 等信息。"
        - "生成 intent.json。"
        - "生成 extracted_data.json，且 records 数量为 30。"
        - "生成 data_quality_summary.json，且 TPS/QPS/P95 空值率为 0%。"
        - "生成 analysis_results.json，包含 single 产品分析结果。"
        - "生成 insights.json，且每条 insight 包含 level 和 source。"
        - "生成 single 报告所需图表。"
        - "生成 report.md、report.docx、report.html 三格式报告。"
        - "生成最小交付检查结果（或等价的门控③最小交付核查结果）。"
      required_content:
        - "报告中必须明确体现产品 TDSQL-B 和版本 v22.7.2。"
        - "报告中必须覆盖 oltp_point_select、oltp_read_only、oltp_read_write、oltp_write_only、oltp_update_index 五个场景。"
        - "报告中必须覆盖 32、64、128、256、512、1000 六个并发档。"
        - "报告中必须包含 TPS、QPS、P95、P99 核心性能指标。"
        - "报告中必须包含 5 场景峰值 QPS 汇总。"
        - "报告中必须包含每个场景的并发-QPS 曲线和并发-P95 曲线。"
        - "报告中必须说明数据来源为 test-resource/mock_tdsqlb_v22_7_2.log。"
        - "报告中不得包含未替换的模板占位符。"
      skill_specific_expectation:
        stop_stage: "completed"
        expected_outputs:
          - "data/intent.json"
          - "data/extracted_data.json"
          - "data/data_quality_summary.json"
          - "data/analysis_results.json"
          - "data/insights.json"
          - "最小交付检查结果（或等价的门控③核查结果）"
          - "charts/single_peak_summary.png"
          - "charts/single_qps_oltp_point_select.png"
          - "charts/single_p95_oltp_point_select.png"
          - "charts/single_qps_oltp_read_only.png"
          - "charts/single_p95_oltp_read_only.png"
          - "charts/single_qps_oltp_read_write.png"
          - "charts/single_p95_oltp_read_write.png"
          - "charts/single_qps_oltp_write_only.png"
          - "charts/single_p95_oltp_write_only.png"
          - "charts/single_qps_oltp_update_index.png"
          - "charts/single_p95_oltp_update_index.png"
          - "report.md"
          - "report.docx"
          - "report.html"
        forbidden_outputs:
          - "内部数据库查询结果"
          - "内部 API 查询结果"
          - "线上任务系统查询结果"
          - "根据 task_id/report_id/plan_id 生成的 records"
      data_expectation:
        source_info:
          type: "local_file"
          value: "test-resource/mock_tdsqlb_v22_7_2.log"
        record_count: 30
        product_family:
          - "TDSQL-B"
        versions:
          - "v22.7.2"
        scenarios:
          - "oltp_point_select"
          - "oltp_read_only"
          - "oltp_read_write"
          - "oltp_write_only"
          - "oltp_update_index"
        concurrencies:
          - 32
          - 64
          - 128
          - 256
          - 512
          - 1000
        required_non_null_fields:
          - "tps"
          - "qps"
          - "p95_ms"
          - "p99_ms"
        traceable_metric_examples:
          - metric: "oltp_point_select peak_qps"
            expected_value: 78230.60
            expected_threads: 512
          - metric: "oltp_read_only peak_qps"
            expected_value: 47322.80
            expected_threads: 512
          - metric: "oltp_update_index peak_qps"
            expected_value: 13250.40
            expected_threads: 512
    judge:
      pass_if_all:
        - "生成 data/intent.json，且 report_type 为 single。"
        - "生成 data/extracted_data.json，且 source_info.type 为 local_file。"
        - "data/extracted_data.json 中 source_info.value 指向 test-resource/mock_tdsqlb_v22_7_2.log。"
        - "data/extracted_data.json 中 records 数量为 30。"
        - "data/extracted_data.json 中能识别出产品家族 TDSQL-B 和版本 v22.7.2，允许使用等价的标准化表达。"
        - "data/extracted_data.json 中包含 oltp_point_select、oltp_read_only、oltp_read_write、oltp_write_only、oltp_update_index 五个场景。"
        - "data/extracted_data.json 中包含 32、64、128、256、512、1000 六个并发档。"
        - "data_quality_summary.json 或等价数据质量摘要明确显示 TPS/QPS/P95 空值率为 0%。"
        - "生成 data/analysis_results.json，且包含 single 产品分析结果。"
        - "analysis_results.json 中 oltp_point_select 的峰值 QPS 为 78230.60，峰值并发为 512。"
        - "analysis_results.json 中 oltp_read_only 的峰值 QPS 为 47322.80，峰值并发为 512。"
        - "生成 data/insights.json，且每条 insight 包含 level 和 source。"
        - "charts/ 下至少生成 11 张 single 报告图表。"
        - "charts/ 下生成 single_peak_summary.png。"
        - "charts/ 下为 5 个场景分别生成 single_qps_*.png 和 single_p95_*.png。"
        - "生成 report.md、report.docx、report.html。"
        - "report.md、report.docx、report.html 三种格式中均明确体现产品 TDSQL-B 和版本 v22.7.2。"
        - "report.md、report.docx、report.html 三种格式中的核心 TPS/QPS/P95/P99 数值一致。"
        - "生成最小交付检查结果（或等价的门控③核查结果），且明确确认三格式文件存在、图表引用正常、核心内容满足最小交付要求。"
        - "report.md 或 report.html 中引用 charts/ 下的相对图表路径。"
        - "report.md 和 report.html 中不存在形如 {xxx} 的模板占位符残留。"
        - "未调用、建议调用或模拟调用内部数据库、内部 API、线上任务系统。"
      fail_if_any:
        - "未生成 report.md、report.docx、report.html 中任意一种格式。"
        - "未生成 data/intent.json、data/extracted_data.json、data/analysis_results.json 或 data/insights.json。"
        - "data/extracted_data.json 中 records 数量不是 30。"
        - "data/extracted_data.json 缺少 TPS、QPS、P95、P99 任一核心指标字段。"
        - "data_quality_summary.json 或等价数据质量摘要显示 TPS/QPS/P95 任一空值率大于 0%。"
        - "将 single 报告误判为 comparison、iteration 或 custom。"
        - "将 5 个 sysbench 场景合并成一个平均值进行分析。"
        - "未按场景分别生成并发-QPS 曲线和并发-P95 曲线。"
        - "charts/ 下 single 报告图表数量少于 11 张。"
        - "报告中的核心性能指标无法从 test-resource/mock_tdsqlb_v22_7_2.log 追溯。"
        - "report.md、report.docx、report.html 三格式中的核心 TPS/QPS/P95/P99 数值不一致。"
        - "report.md 或 report.html 中出现未替换的模板占位符。"
        - "输出任何由模型编造、估算或猜测得到的 TPS、QPS、P95、P99、duration 数值。"
        - "调用、建议调用或模拟调用内部数据库、内部 API、线上任务系统、task_id、report_id 或 plan_id 查询数据。"
        - "未生成最小交付检查结果（或等价的门控③核查结果）。"
    coverage:
      stages:
        - "阶段1-输入解析"
        - "门控①-意图确认"
        - "阶段2-数据源接入"
        - "阶段2-数据标准化"
        - "门控②-数据质量确认"
        - "阶段3-single性能分析"
        - "阶段4-图表生成"
        - "阶段5-三格式报告组装"
        - "门控③-最小交付检查"
      rubrics:
        - "R1"
        - "R2"
        - "R3"
        - "R4"
        - "R5"
        - "R6"
      references:
        - "db_report_skill/SKILL.md"
        - "db_report_skill/references/意图解析规范.md"
        - "db_report_skill/references/数据源接入规范.md"
        - "db_report_skill/references/分析方法论.md"
        - "db_report_skill/references/报告类型模板规范.md"
        - "db_report_skill/references/三格式输出规范.md"
        - "db_report_skill/references/最小交付标准.md"
    fatal_errors:
      - "wrong_report_type"
      - "local_log_not_parsed"
      - "missing_intermediate_artifacts"
      - "incorrect_record_count"
      - "missing_required_metric"
      - "fabricated_performance_metrics"
      - "scenario_aggregation_error"
      - "insufficient_charts"
      - "missing_three_format_delivery"
      - "three_format_metric_inconsistency"
      - "untraceable_core_metrics"
      - "template_placeholder_leftover"
      - "internal_data_access"


  - id: "DB-02"
    title: "records JSON 多产品对比报告端到端生成"
    priority: "P0"
    tags:
      - "happy_path"
      - "local_json"
      - "records_json"
      - "comparison_report"
      - "end_to_end"
      - "fairness_check"
      - "three_format_delivery"
    objective: "验证 Skill 在用户提供题目 test-resource 中的标准 records JSON 文件时，能够正确识别 comparison 报告类型，基于相同场景、相同并发档和相同测试口径完成多产品横向对比，生成分析结果、洞察、对比图表以及 report.md、report.docx、report.html 三格式报告。"
    input:
      user_request: "请基于 test-resource/mock_records_aggregation.json 生成一份数据库性能对比报告，对比 TDSQL-B v22.7.3、MySQL 8.0.32、OceanBase 4.2 三个产品在 sysbench 五个 OLTP 场景下的表现，并输出 report.md、report.docx、report.html 三种格式。"
      files:
        - "test-resource/mock_records_aggregation.json"
      pasted_data: ""
      skill_specific_input:
        expected_input_mode: "local_file"
        expected_file_type: "json"
        expected_report_type: "comparison"
        expected_products:
          - "TDSQL-B v22.7.3"
          - "MySQL 8.0.32"
          - "OceanBase 4.2"
        expected_product_count: 3
        expected_scenarios:
          - "oltp_point_select"
          - "oltp_read_only"
          - "oltp_read_write"
          - "oltp_write_only"
          - "oltp_update_index"
        expected_scenario_count: 5
        expected_concurrencies:
          - 32
          - 64
          - 128
          - 256
          - 512
          - 1000
        expected_concurrency_count: 6
        expected_record_count: 90
        expected_chart_min_count: 20
        expected_output_formats:
          - "md"
          - "docx"
          - "html"
    expected_output:
      task_understanding:
        - "识别当前任务是数据库性能测试报告生成请求。"
        - "识别用户提供了本地 JSON 文件 test-resource/mock_records_aggregation.json。"
        - "识别输入文件是标准 records JSON。"
        - "识别输入模式为 local_file。"
        - "识别报告类型为 comparison。"
        - "识别对比对象为 TDSQL-B v22.7.3、MySQL 8.0.32、OceanBase 4.2。"
        - "识别用户要求输出 report.md、report.docx、report.html 三种格式。"
      required_actions:
        - "读取 test-resource/mock_records_aggregation.json。"
        - "解析 meta.products、meta.scenarios、meta.concurrencies、meta.source_info 和 records。"
        - "生成 data/intent.json，且 report_type 为 comparison。"
        - "生成 data/extracted_data.json，且 records 数量为 90。"
        - "生成 data/data_quality_summary.json，且 TPS/QPS/P95 空值率为 0%。"
        - "执行公平性核查，检查三个产品是否覆盖相同场景、相同并发档、相同测试时长和相同数据集口径。"
        - "生成 data/analysis_results.json，且包含 product_compare 对比分析结果。"
        - "生成 data/insights.json，且 comparison 相关 insight 包含 level 和 source。"
        - "按五个场景分别生成峰值 QPS 对比、并发-QPS 对比、并发-P95 对比图表。"
        - "生成综合评分雷达图和综合排名图。"
        - "生成 report.md、report.docx、report.html 三格式报告。"
      required_content:
        - "报告中必须出现 TDSQL-B v22.7.3、MySQL 8.0.32、OceanBase 4.2 三个产品。"
        - "报告中必须覆盖 oltp_point_select、oltp_read_only、oltp_read_write、oltp_write_only、oltp_update_index 五个场景。"
        - "报告中必须覆盖 32、64、128、256、512、1000 六个并发档。"
        - "报告中必须包含 TPS、QPS、P95、P99 核心性能指标。"
        - "报告中必须按相同 scenario 和相同 threads 进行横向比较。"
        - "报告中必须包含公平性说明，说明对比是否满足相同场景、相同并发档、相同数据集和相同测试时长。"
        - "报告中必须包含每个场景的峰值 QPS 对比结论。"
        - "报告中必须说明数据来源为 test-resource/mock_records_aggregation.json。"
        - "报告中不得包含未替换的模板占位符。"
      skill_specific_expectation:
        stop_stage: "completed"
        expected_outputs:
          - "data/intent.json"
          - "data/extracted_data.json"
          - "data/data_quality_summary.json"
          - "data/analysis_results.json"
          - "data/insights.json"
          - "charts/*"
          - "report.md"
          - "report.docx"
          - "report.html"
        forbidden_outputs:
          - "内部数据库查询结果"
          - "内部 API 查询结果"
          - "线上任务系统查询结果"
          - "根据 task_id/report_id/plan_id 补查得到的 records"
      data_expectation:
        source_info:
          type: "local_file"
          value: "test-resource/mock_records_aggregation.json"
          rows_fetched: 90
        record_count: 90
        products:
          - "TDSQL-B v22.7.3"
          - "MySQL 8.0.32"
          - "OceanBase 4.2"
        scenarios:
          - "oltp_point_select"
          - "oltp_read_only"
          - "oltp_read_write"
          - "oltp_write_only"
          - "oltp_update_index"
        concurrencies:
          - 32
          - 64
          - 128
          - 256
          - 512
          - 1000
        required_non_null_fields:
          - "tps"
          - "qps"
          - "p95_ms"
          - "p99_ms"
        traceable_metric_examples:
          - product: "TDSQL-B v22.7.3"
            scenario: "oltp_point_select"
            threads: 512
            metric: "qps"
            expected_value: 89928.71
          - product: "MySQL 8.0.32"
            scenario: "oltp_point_select"
            threads: 512
            metric: "qps"
            expected_value: 71646.19
          - product: "OceanBase 4.2"
            scenario: "oltp_point_select"
            threads: 512
            metric: "qps"
            expected_value: 79641.75
          - product: "TDSQL-B v22.7.3"
            scenario: "oltp_read_only"
            threads: 512
            metric: "qps"
            expected_value: 52086.84
    judge:
      pass_if_all:
        - "生成 data/intent.json，且 report_type 为 comparison。"
        - "生成 data/extracted_data.json，且 source_info.type 为 local_file。"
        - "data/extracted_data.json 中 source_info.value 指向 test-resource/mock_records_aggregation.json。"
        - "data/extracted_data.json 中 records 数量为 90。"
        - "data/extracted_data.json 中包含 TDSQL-B v22.7.3、MySQL 8.0.32、OceanBase 4.2 三个产品。"
        - "data/extracted_data.json 中包含 oltp_point_select、oltp_read_only、oltp_read_write、oltp_write_only、oltp_update_index 五个场景。"
        - "data/extracted_data.json 中每个产品在每个场景下均覆盖 32、64、128、256、512、1000 六个并发档。"
        - "data_quality_summary.json 或等价数据质量摘要明确显示 TPS/QPS/P95 空值率为 0%。"
        - "生成 data/analysis_results.json，且 report_type 为 comparison。"
        - "analysis_results.json 中包含 product_compare 字段。"
        - "analysis_results.json 中 product_compare 至少包含 peak_qps、concurrent_scale、p95_latency、overall_score 中的三个分析维度。"
        - "analysis_results.json 或报告正文中包含公平性核查结果。"
        - "公平性核查未把不同 scenario 的数据直接混合比较。"
        - "公平性核查未把不同 threads 的数据直接混合比较。"
        - "analysis_results.json 或报告正文中能追溯 TDSQL-B v22.7.3 在 oltp_point_select、threads=512 时 qps=89928.71。"
        - "analysis_results.json 或报告正文中能追溯 MySQL 8.0.32 在 oltp_point_select、threads=512 时 qps=71646.19。"
        - "analysis_results.json 或报告正文中能追溯 OceanBase 4.2 在 oltp_point_select、threads=512 时 qps=79641.75。"
        - "生成 data/insights.json，且 comparison 相关 insight 每条包含 level 和 source。"
        - "charts/ 下至少生成 20 张 comparison 报告图表。"
        - "charts/ 中包含五个场景的峰值 QPS 对比图。"
        - "charts/ 中包含五个场景的并发-QPS 对比图。"
        - "charts/ 中包含五个场景的并发-P95 对比图。"
        - "charts/ 中包含综合评分雷达图或综合排名图。"
        - "生成 report.md、report.docx、report.html。"
        - "report.md、report.docx、report.html 三种格式中均出现 TDSQL-B v22.7.3、MySQL 8.0.32、OceanBase 4.2。"
        - "report.md、report.docx、report.html 三种格式中的核心 TPS/QPS/P95/P99 数值一致。"
        - "report.md 或 report.html 中引用 charts/ 下的相对图表路径。"
        - "report.md 和 report.html 中不存在形如 {xxx} 的模板占位符残留。"
        - "未调用、建议调用或模拟调用内部数据库、内部 API、线上任务系统。"
        - "未根据 task_id、report_id 或 plan_id 补查或伪造数据。"
      fail_if_any:
        - "未生成 report.md、report.docx、report.html 中任意一种格式。"
        - "未生成 data/intent.json、data/extracted_data.json、data/analysis_results.json 或 data/insights.json。"
        - "将 comparison 报告误判为 single、iteration 或 custom。"
        - "data/extracted_data.json 中 records 数量不是 90。"
        - "data/extracted_data.json 缺少 TDSQL-B v22.7.3、MySQL 8.0.32、OceanBase 4.2 任一产品。"
        - "data/extracted_data.json 缺少 TPS、QPS、P95、P99 任一核心指标字段。"
