        - "识别该请求意图走本地文件输入路线。"
        - "识别用户希望生成 single 类型报告。"
        - "识别用户要求输出 md、docx、html 三种格式。"
        - "在阶段2前置校验中发现 test-resource/not_exist.log 不存在。"
