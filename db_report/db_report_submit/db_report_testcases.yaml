  - id: "DB-09"
    title: "OR 条件解析与数据筛选"
    priority: "P1"
    tags:
      - "intent_parsing"
      - "or_condition"
      - "filter_logic"
      - "records_json"
      - "boundary_case"
    objective: "验证 Skill 在用户请求中出现“场景 A 或 场景 B”的 OR 条件时，能够在阶段1正确解析为并集筛选条件，并在阶段2基于 records JSON 筛选出任一条件命中的记录，不得误解析为 AND 条件或只保留其中一个场景。"
    input:
      user_request: "请基于 test-resource/mock_records_aggregation.json，分析 oltp_read_only 或 oltp_write_only 场景下三个产品的性能表现，并生成一份对比分析报告。"
      files:
        - "test-resource/mock_records_aggregation.json"
      pasted_data: ""
      skill_specific_input:
        expected_input_mode: "local_file"
        expected_file_type: "json"
        expected_report_type: "comparison"
        expected_condition_type: "OR"
        expected_filter_scope: "scenario"
        expected_selected_scenarios:
          - "oltp_read_only"
          - "oltp_write_only"
        expected_products:
          - "TDSQL-B v22.7.3"
          - "MySQL 8.0.32"
          - "OceanBase 4.2"
        expected_concurrencies:
          - 32
          - 64
          - 128
          - 256
          - 512
          - 1000
        expected_filtered_record_count: 36
    expected_output:
      task_understanding:
        - "识别当前任务是数据库性能测试报告生成请求。"
        - "识别用户提供了本地 JSON 文件 test-resource/mock_records_aggregation.json。"
        - "识别输入文件是 records JSON。"
        - "识别用户希望生成 comparison 类型对比分析报告。"
        - "识别用户筛选条件是 oltp_read_only 或 oltp_write_only。"
        - "识别“或”表示 OR 条件，而不是 AND 条件。"
      required_actions:
        - "在阶段1意图解析中记录 OR 条件。"
        - "将筛选条件解析为 scenario in [oltp_read_only, oltp_write_only]。"
        - "读取 test-resource/mock_records_aggregation.json。"
        - "在阶段2数据接入后筛选 records。"
        - "保留 scenario=oltp_read_only 和 scenario=oltp_write_only 的所有产品与并发档记录。"
        - "筛选后 records 数量应为 36。"
        - "基于筛选后的 records 继续进行对比分析。"
      required_content:
        - "intent.json 或意图解析结果中必须明确体现 OR 条件。"
        - "筛选结果中必须同时包含 oltp_read_only 和 oltp_write_only 两个场景。"
        - "筛选结果中不得包含 oltp_point_select、oltp_read_write、oltp_update_index。"
        - "筛选结果中必须包含三个产品。"
        - "筛选结果中每个产品在每个选中场景下必须覆盖 32、64、128、256、512、1000 六个并发档。"
        - "intent.json 中 dimension_filters.test_name_keywords_or 必须拆分为两个独立场景分支，不得把 'oltp_read_only 或 oltp_write_only' 当作一个整体字符串。"
      skill_specific_expectation:
        stop_stage: "stage_2_or_filter_check_completed"
        expected_outputs:
          - "data/intent.json"
          - "data/extracted_data.json"
        optional_outputs:
          - "data/analysis_results.json"
        expected_intent_fields:
          report_type: "comparison"
          dimension_filters:
            test_name_keywords: null
            test_name_keywords_or:
              - ["read_only"]
              - ["write_only"]
        expected_filter_result:
          selected_scenarios:
            - "oltp_read_only"
            - "oltp_write_only"
          excluded_scenarios:
            - "oltp_point_select"
            - "oltp_read_write"
            - "oltp_update_index"
          filtered_record_count: 36
        forbidden_outputs:
          - "将 OR 条件解析为 AND 条件"
          - "只保留 oltp_read_only 单一场景"
          - "只保留 oltp_write_only 单一场景"
          - "把五个场景全部纳入筛选结果"
          - "内部数据库查询结果"
          - "内部 API 查询结果"
          - "线上任务系统查询结果"
    judge:
      pass_if_all:
        - "intent.json 或意图解析结果明确将 oltp_read_only 和 oltp_write_only 解析为 OR 条件。"
        - "筛选逻辑明确等价于 scenario in [oltp_read_only, oltp_write_only]。"
        - "data/extracted_data.json 或筛选后的 records 中同时包含 oltp_read_only 和 oltp_write_only。"
        - "data/extracted_data.json 或筛选后的 records 中不包含 oltp_point_select、oltp_read_write、oltp_update_index。"
        - "intent.json 或等价意图解析结果中，dimension_filters.test_name_keywords_or 明确为 [\"read_only\"] 和 [\"write_only\"] 两个独立分支。"
        - "筛选后的 records 数量为 36。"
        - "筛选后的 records 中包含 TDSQL-B v22.7.3、MySQL 8.0.32、OceanBase 4.2 三个产品。"
        - "筛选后的 records 中每个产品在 oltp_read_only 场景下覆盖 32、64、128、256、512、1000 六个并发档。"
        - "筛选后的 records 中每个产品在 oltp_write_only 场景下覆盖 32、64、128、256、512、1000 六个并发档。"
        - "如果生成 data/analysis_results.json，则分析结果只基于 oltp_read_only 和 oltp_write_only 两个场景展开。"
        - "未调用、建议调用或模拟调用内部数据库、内部 API、线上任务系统。"
      fail_if_any:
        - "将“oltp_read_only 或 oltp_write_only”解析为 AND 条件。"
        - "将 'oltp_read_only 或 oltp_write_only' 作为一个未拆分的整体字符串处理。"
        - "筛选结果为空。"
        - "筛选后仅保留 oltp_read_only 或仅保留 oltp_write_only，未保留 OR 的两个分支。"
        - "筛选后仍包含 oltp_point_select、oltp_read_write 或 oltp_update_index。"
        - "筛选后的 records 数量不是 36。"
        - "如果生成 data/analysis_results.json，则其中包含 oltp_point_select、oltp_read_write 或 oltp_update_index 的分析内容。"
        - "把五个场景全部纳入分析，未执行 OR 条件筛选。"
        - "将不同场景的数据合并成一个总平均值后进行分析。"
        - "输出任何由模型编造、估算或猜测得到的 TPS、QPS、P95、P99、duration 数值。"
        - "调用、建议调用或模拟调用内部数据库、内部 API、线上任务系统、task_id、report_id 或 plan_id 查询数据。"
    coverage:
      stages:
        - "阶段1-输入解析"
        - "门控①-意图确认"
        - "阶段2-数据源接入"
        - "阶段2-数据标准化"
      rubrics:
        - "R1"
        - "R2"
        - "R3"
      references:
        - "db_report_skill/SKILL.md"
        - "db_report_skill/references/意图解析规范.md"
        - "db_report_skill/references/数据源接入规范.md"
    fatal_errors:
      - "or_condition_parsed_as_and"
      - "wrong_filter_scope"
      - "missing_or_branch"
      - "unexpected_scenario_included"
      - "incorrect_filtered_record_count"
      - "fabricated_performance_metrics"
      - "internal_data_access"


