  - id: "DB-07"
    title: "关键指标空值触发门控②失败"
    priority: "P0"
    tags:
      - "failure_path"
      - "data_quality_gate"
      - "missing_required_field"
      - "null_metric"
      - "stage_2_quality_check"
    objective: "验证 Skill 在用户提供了可解析 records JSON，但 TPS、QPS、P95 等关键性能字段存在缺失或空值时，必须在阶段2的数据质量门控处停止，不得继续进入性能分析、图表生成或正式报告交付。"
